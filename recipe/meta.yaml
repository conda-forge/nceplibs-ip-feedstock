{% set name = "nceplibs-ip" %}
{% set version = "5.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/NOAA-EMC/NCEPLIBS-ip/archive/refs/tags/v{{ version }}.tar.gz
  sha256: c80eab0a28a081a90051257490e4fc801a90f66cb9e2435119379649b4289577
#  patches:
#    - 0001-Configure-flags-for-Intel-and-gfortran.patch  # [win]

build:
  number: 0

requirements:
  build:
    - {{ compiler('fortran') }}        # [not win]
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - make                             # [not win]
    - {{ compiler('m2w64_fortran') }}  # [win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - ninja                            # [win]
    - cmake
    - pkg-config >=0.21
  host:
    - libgomp        # [linux]
    - llvm-openmp    # [osx]
    - openmp ==5.0.0   # [win]
    - openblas
  run:
    - libgomp        # [linux]
    - llvm-openmp    # [osx]
    - openmp ==5.0.0   # [win]
    - openblas

test:
  commands:
    - test -f ${PREFIX}/lib/libip_4${SHLIB_EXT}       # [not win]
    - if not exist %LIBRARY_BIN%\\libip_4.dll exit 1  # [win]

about:
  home: https://github.com/NOAA-EMC/NCEPLIBS-ip
  summary: The NCEP interpolation library contains Fortran 90 subprograms used for interpolating between nearly all grids used at NCEP.
  license: LGPL-3.0-only
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - EricEngle-NOAA
    - TimothyCera-NOAA
